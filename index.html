<!DOCTYPE html>
<html>
<head>
<title>Mafiya Loader</title>
</head>
<body>

<h2>Loading project...</h2>

<div id="app"></div>

<script>
fetch("https://api.github.com/repos/dilruvanchamikara2011/dil/contents/index.html")
.then(res => res.json())
.then(data => {
  const decoded = atob(data.content);
  document.getElementById("app").innerHTML = decoded;
});
</script>

</body>
</html>
